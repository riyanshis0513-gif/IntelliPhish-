<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - PhishGuard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#020617] text-white flex items-center justify-center h-screen">

<div class="bg-[#0f172a] p-8 rounded-2xl shadow-xl w-96">

    <h2 class="text-2xl font-bold mb-6 text-center text-blue-400">Register</h2>

    <!-- ✅ FLASH MESSAGES -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <p class="bg-red-500 text-white p-2 rounded mb-4 text-sm text-center">
            {{ msg }}
          </p>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">

        <input type="text" name="username" placeholder="Username"
            class="w-full p-3 mb-4 rounded bg-gray-800" required>

        <input type="email" name="email" placeholder="Email"
            class="w-full p-3 mb-4 rounded bg-gray-800" required>

        <!-- PASSWORD FIELD WITH TOGGLE -->
        <div class="relative">
            <input type="password" id="password" name="password" placeholder="Password"
                class="w-full p-3 mb-4 rounded bg-gray-800 pr-10"
                minlength="6" required>

            <span onclick="togglePassword()"
                  class="absolute right-3 top-3 cursor-pointer text-gray-400">
                👁️
            </span>
        </div>

        <button class="w-full bg-blue-500 hover:bg-blue-600 py-3 rounded">
            Register
        </button>

    </form>

    <p class="text-sm text-gray-400 mt-4 text-center">
        Already have an account?
        <a href="/login" class="text-blue-400 hover:underline">Login</a>
    </p>

</div>

<!-- 👁️ TOGGLE SCRIPT -->
<script>
function togglePassword() {
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
