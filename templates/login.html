<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - PhishGuard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#020617] text-white flex items-center justify-center h-screen">

<div class="bg-[#0f172a] p-8 rounded-2xl shadow-xl w-96">

    <h2 class="text-2xl font-bold mb-6 text-center text-blue-400">Login</h2>

    <!-- FLASH MESSAGE -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
            <div class="bg-red-500 text-white p-2 mb-4 rounded text-sm text-center">
                {{ msg }}
            </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">

        <input type="email" name="email" placeholder="Email"
            class="w-full p-3 mb-4 rounded bg-gray-800" required>

        <!-- PASSWORD WITH TOGGLE -->
        <div class="relative">
            <input type="password" id="password" name="password" placeholder="Password"
                class="w-full p-3 mb-4 rounded bg-gray-800 pr-10" required>

            <span onclick="togglePassword()"
                  class="absolute right-3 top-3 cursor-pointer text-gray-400">
                👁️
            </span>
        </div>

        <button class="w-full bg-blue-500 hover:bg-blue-600 py-3 rounded">
            Login
        </button>

    </form>

    <div class="flex justify-between mt-4 text-sm text-gray-400">
        <a href="/forgot" class="hover:text-blue-400">Forgot Password?</a>
        <a href="/register" class="hover:text-blue-400">Register</a>
    </div>

</div>

<!-- TOGGLE SCRIPT -->
<script>
function togglePassword() {
    const pass = document.getElementById("password");
    pass.type = pass.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
