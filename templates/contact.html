<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact - PhishGuard</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: radial-gradient(circle at top, #0f172a, #020617);
}
</style>
</head>

<body class="text-white">

<!-- NAVBAR -->
<nav class="flex justify-between items-center px-10 py-5">
    <h1 class="text-2xl font-bold text-blue-400">🛡️ PhishGuard</h1>

    <div class="space-x-8 hidden md:flex">
        <a href="/" class="hover:text-blue-400">Home</a>
        <a href="/features" class="hover:text-blue-400">Features</a>
        <a href="/about" class="hover:text-blue-400">About</a>
        <a href="/contact" class="text-blue-400">Contact</a>
    </div>

    <a href="/admin-login" class="border border-blue-500 px-4 py-2 rounded-lg hover:bg-blue-500">
        Admin Login
    </a>
</nav>

<!-- CONTACT -->
<section class="px-10 py-16">

    <h1 class="text-4xl text-center mb-10">Contact Us</h1>

    <div class="grid md:grid-cols-2 gap-10">

        <!-- FORM -->
        <div class="bg-slate-900 p-8 rounded-2xl">

            <h2 class="text-xl mb-6">Send a Message</h2>

            <!-- ✅ Flash Message -->
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="bg-green-500 text-white p-3 rounded mb-4 text-center">
                  {{ messages[0] }}
                </div>
              {% endif %}
            {% endwith %}

            <!-- ✅ FORM START -->
            <form method="POST" action="/contact">

                <input type="text" name="name" placeholder="Your Name"
                    class="w-full mb-4 p-3 bg-slate-800 rounded" required>

                <input type="email" name="email" placeholder="Your Email"
                    class="w-full mb-4 p-3 bg-slate-800 rounded" required>

                <input type="text" name="subject" placeholder="Subject"
                    class="w-full mb-4 p-3 bg-slate-800 rounded" required>

                <textarea name="message" placeholder="Message"
                    class="w-full mb-4 p-3 bg-slate-800 rounded" required></textarea>

                <button type="submit"
                    class="bg-blue-500 px-6 py-3 rounded hover:bg-blue-600 w-full">
                    Send Message
                </button>

            </form>
            <!-- ✅ FORM END -->

        </div>

        <!-- INFO -->
        <div class="bg-slate-900 p-8 rounded-2xl">

            <h2 class="text-xl mb-6">Contact Info</h2>

            <p class="text-gray-400 mb-4">📧 support@phishguard.com</p>
            <p class="text-gray-400 mb-4">📞 +91 98765 43210</p>
            <p class="text-gray-400 mb-4">📍 India</p>
            <p class="text-gray-400">🕒 Mon - Sat (9AM - 6PM)</p>

        </div>

    </div>

</section>

</body>
</html>
