<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - PhishGuard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#020617] text-white flex items-center justify-center h-screen">

<div class="bg-[#0f172a] p-8 rounded-2xl shadow-xl w-96">

    <h2 class="text-2xl font-bold mb-6 text-center text-blue-400">
        Reset Password
    </h2>

    <form method="POST">

        <input type="email" name="email" placeholder="Enter your email"
            class="w-full p-3 mb-4 rounded bg-gray-800" required>

        <input type="password" name="password" placeholder="New Password"
            class="w-full p-3 mb-4 rounded bg-gray-800" required>

        <button class="w-full bg-blue-500 hover:bg-blue-600 py-3 rounded">
            Update Password
        </button>

    </form>

    <p class="text-sm text-gray-400 mt-4 text-center">
        Back to <a href="/login" class="text-blue-400 hover:underline">Login</a>
    </p>

</div>

</body>
</html>
