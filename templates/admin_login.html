<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 flex items-center justify-center h-screen">

<div class="bg-gray-800 p-8 rounded-2xl shadow-lg w-96">
    
    <h2 class="text-3xl font-bold text-center text-white mb-6">
        Admin Login 🔐
    </h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="bg-red-500 text-white p-2 rounded mb-4 text-center">
            {{ messages[0] }}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST" action="/admin-login">
        
        <input type="email" name="email" placeholder="Admin Email"
            class="w-full p-3 mb-4 rounded bg-gray-700 text-white focus:outline-none" required>

        <input type="password" name="password" placeholder="Password"
            class="w-full p-3 mb-4 rounded bg-gray-700 text-white focus:outline-none" required>

        <button type="submit"
            class="w-full bg-red-500 hover:bg-red-600 text-white p-3 rounded font-semibold">
            Login
        </button>
    </form>

    <p class="text-gray-400 text-center mt-4">
        Back to <a href="/" class="text-blue-400">Home</a>
    </p>

</div>

</body>
</html>
